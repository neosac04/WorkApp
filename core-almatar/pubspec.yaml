name: core
description: Shared core utilities, widgets, and services for the super app.
version: 1.0.0
publish_to: none

environment:
  sdk: ^3.9.2
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # analytics:
    #   path: ../analytics
  flutter_riverpod: ^3.0.3
  json_annotation: ^4.9.0
  freezed_annotation: ^3.1.0
  freezed: ^3.2.3
  dio: ^5.9.0
  retrofit: ^4.9.2
  dartz: ^0.10.1
  connectivity_plus: ^7.0.0
  path_provider: ^2.1.5
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.2.3
  cached_network_image: ^3.4.1
  lokalise_flutter_sdk: ^3.0.0
  go_router: ^17.0.1
  envied: ^1.3.2
  file_picker: ^10.3.7
  image_picker: ^1.2.1
  skeletonizer: ^2.1.2
  webview_flutter: ^4.13.0
  geolocator: ^14.0.1
  geocoding: ^4.0.0
  permission_handler: ^12.0.1
  url_launcher: ^6.3.2
  device_info_plus: ^12.3.0
  lottie: ^3.3.2
#  share_plus: ^8.0.2
  intl: ^0.20.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2
  flutter_cache_manager: ^3.3.1
  #Firebase
  firebase_core: ^4.3.0
  firebase_messaging: ^16.1.0
  flutter_local_notifications: ^19.5.0
  open_file: ^3.5.11


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.10.4
  retrofit_generator: ^10.2.1
  riverpod_generator: ^3.0.3
  flutter_gen_runner: ^5.12.0
  envied_generator: ^1.3.2
  json_serializable: ^6.11.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/
    - assets/fonts/
    - assets/icons/
    - assets/images/
    - assets/loader/

  fonts:
    - family: Onest
      fonts:
        - asset: assets/fonts/Onest-Light.ttf
          weight: 300
        - asset: assets/fonts/Onest-Regular.ttf
          weight: 400
        - asset: assets/fonts/Onest-Medium.ttf
          weight: 500
        - asset: assets/fonts/Onest-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Onest-Bold.ttf
          weight: 700
        - asset: assets/fonts/Onest-ExtraBold.ttf
          weight: 800


flutter_gen:
  output: lib/gen/
  integrations:
    flutter_svg: true
    lottie: true
  # Assets configuration
  assets:
    enabled: true
    outputs:
      package_parameter_enabled: true

  # Fonts configuration
  fonts:
    enabled: true
    outputs:
      package_parameter_enabled: true
