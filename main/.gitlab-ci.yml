stages:
  - quality

translation_check:
  stage: quality
  image: dart:stable
  variables:
    TRANSLATION_REPORT_PATH: "reports/main_branch_report.json"
    TRANSLATION_MAX_MISSING: "0"
    TRANSLATION_MAX_EXTRA: "0"
    TRANSLATION_MAX_DUPLICATES: "999999"
    TRANSLATION_MAX_TOTAL_ISSUES: "999999"
  script:
    - dart --version
    - dart run tool/translation_check.dart
    - dart run tool/translation_gate.dart --report="$TRANSLATION_REPORT_PATH" --max-missing="$TRANSLATION_MAX_MISSING" --max-extra="$TRANSLATION_MAX_EXTRA" --max-duplicates="$TRANSLATION_MAX_DUPLICATES" --max-total-issues="$TRANSLATION_MAX_TOTAL_ISSUES"
  artifacts:
    when: always
    paths:
      - reports/main_branch_report.txt
      - reports/main_branch_report.json
    expire_in: 90 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
    - when: never